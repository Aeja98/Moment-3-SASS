<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Karta</title>
</head>

<body class="indexLayout">
    <header>
        <h1>Webbutveckling - Frontend-baserad Webbutveckling</h1>
        <nav aria-label="Huvudmeny">
            <ul>
                <li><a href="/index.html">Start</a></li>
                <li><a href="/sass.html">SASS</a></li>
                <li><a href="/animering.html">Animering</a></li>
                <li><a href="/diagram.html">Diagram</a></li>
                <li><a href="/karta.html">Karta</a></li>
            </ul>
        </nav>
    </header>

    <main class="mapContent">
        <section class="mapSec">
            <h2>Sök en plats</h2>

            <form id="mapForm">
                <label for="placeInput">Plats:</label>
                <input id="placeInput" type="text" placeholder="t.ex Stockholm" required />
                <button type="submit">Sök</button>
            </form>

            <p id="placeStatus" role="status"></p>

            <iframe
                id="mapFrame"
                title="openStreetMap"
                width="100%"
                height="420"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
            ></iframe>

            <p class="attribution">Kartdata © OpenStreetMap-bidragsgivare</p>
        </section>
    </main>
    
    <footer>
        <ul>
            <li>DT211G Datateknik</li>
            <li>Frontend-baserad webbutveckling</li>
            <li>Angelica Adolfsson</li>
        </ul>
    </footer>
    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
